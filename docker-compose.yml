version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: portfolio-db
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: portfolio_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: portfolio-backend
    restart: unless-stopped
    network_mode: host
    volumes:
      - /home/naradaagastya/PortofolioWebsite/.env:/app/.env
    environment:
      NODE_OPTIONS: "--tls-min-v1.2 --openssl-legacy-provider"
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/portfolio_db
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
      LINKEDIN_SLUG: ${LINKEDIN_SLUG:-narada-607387219}
      LINKEDIN_LI_AT: ${LINKEDIN_LI_AT}
      LINKEDIN_JSESSIONID: ${LINKEDIN_JSESSIONID}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: https://portofolio.najworks.me
        INTERNAL_API_URL: http://127.0.0.1:3001
        NEXT_SERVER_API_URL: http://127.0.0.1:3001
    container_name: portfolio-frontend
    restart: unless-stopped
    network_mode: host
    environment:
      NEXT_PUBLIC_API_URL: https://portofolio.najworks.me
      INTERNAL_API_URL: http://127.0.0.1:3001
      NEXT_SERVER_API_URL: http://127.0.0.1:3001
    depends_on:
      - backend

volumes:
  postgres_data:
